name: ridego_customer_app
description: Fully interactive, responsive RideGo customer app UI built from the provided Figma flow.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  socket_io_client: ^2.0.3+1
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
